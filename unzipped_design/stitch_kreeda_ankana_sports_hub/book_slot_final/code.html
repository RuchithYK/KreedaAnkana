<style>
        /* Form Field Reset & Custom Styling for Obsidian Theme */
        input[type="date"], input[type="time"] {
            color-scheme: dark;
        }
        .obsidian-input:focus {
            outline: none;
            box-shadow: none;
            border-bottom-color: #ffffff;
            background: linear-gradient(to top, rgba(255,255,255,0.05), transparent);
        }
        
        /* Metallic Text Gradient */
        .metallic-text {
            background: linear-gradient(180deg, #FFFFFF 0%, #8e9192 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Glass Panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-[#000000] text-primary min-h-screen flex flex-col font-body-md antialiased pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 dark:bg-black/90 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-6 py-4">
<button class="flex items-center justify-center p-2 rounded-none hover:bg-white/10 transition-all duration-200 active:scale-95 transform">
<span class="material-symbols-outlined dark:text-white text-2xl" data-icon="arrow_back" data-weight="fill" style="font-variation-settings: 'FILL' 1;">arrow_back</span>
</button>
<h1 class="font-lexend font-black italic uppercase tracking-tighter text-2xl dark:text-white">KREEDA-ANKANA</h1>
<div class="w-10 h-10 rounded-full overflow-hidden border border-white/20 hover:bg-white/10 transition-all duration-200 active:scale-95 transform">
<img alt="Elite Athlete Profile" class="w-full h-full object-cover grayscale" data-alt="A striking portrait of an elite athlete in high-contrast monochromatic lighting. Deep black background with sharp, brilliant white rim lighting highlighting muscular definition and intense focus. The mood is aggressive and premium, matching the dark obsidian theme." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCc2KBIbfxtoaoFKVpw1pf_o_vqL3PYJ8FbsRvS8R8x9sWiuTkqubmiMnH6gCqbco8_p55h4lKmrh_jq_pNu9g58P5WTW6MoPkna7Q73Qvip1uw5UHSvagk--lnVe6QWcej9DWnVJYx88sXgr0IdJl1NbvZp948WnlaV2esrGEotgfQU_g3F49QlYMIa9o_9fFOIqzkt1fhlH7sDTvbGfQX4XFWne8Q2dSYin9wGKjpY-gnkNpT3hUZFj_y9lf45HCxKW2-OpZt_F0"/>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 px-6 md:px-gutter max-w-4xl mx-auto w-full flex flex-col gap-xl">
<!-- Warning Banner -->
<div class="bg-error-container/20 border-l-4 border-error p-4 flex items-start gap-sm">
<span class="material-symbols-outlined text-error mt-1" data-icon="warning" data-weight="fill" style="font-variation-settings: 'FILL' 1;">warning</span>
<div>
<h3 class="font-label-bold text-error uppercase">Conflict Detected</h3>
<p class="font-body-md text-on-error-container mt-1">Slot already booked by Team Alpha.</p>
</div>
</div>
<section class="flex flex-col gap-lg">
<h2 class="font-headline-md metallic-text uppercase italic tracking-tight">Select Sport</h2>
<div class="grid grid-cols-2 md:grid-cols-4 gap-sm">
<!-- Sport Chips -->
<button class="bg-white text-black border border-white p-4 flex flex-col items-center justify-center gap-2 hover:bg-white/90 transition-all active:scale-95">
<span class="material-symbols-outlined text-3xl" data-icon="sports_cricket" data-weight="fill" style="font-variation-settings: 'FILL' 1;">sports_cricket</span>
<span class="font-label-bold uppercase">Cricket</span>
</button>
<button class="bg-[#1A1A1A] text-white border border-white/10 p-4 flex flex-col items-center justify-center gap-2 hover:bg-[#1A1A1A]/80 transition-all active:scale-95">
<span class="material-symbols-outlined text-3xl" data-icon="sports_soccer" data-weight="fill" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
<span class="font-label-bold uppercase">Football</span>
</button>
<button class="bg-[#1A1A1A] text-white border border-white/10 p-4 flex flex-col items-center justify-center gap-2 hover:bg-[#1A1A1A]/80 transition-all active:scale-95">
<span class="material-symbols-outlined text-3xl" data-icon="sports_basketball" data-weight="fill" style="font-variation-settings: 'FILL' 1;">sports_basketball</span>
<span class="font-label-bold uppercase">Basketball</span>
</button>
<button class="bg-[#1A1A1A] text-white border border-white/10 p-4 flex flex-col items-center justify-center gap-2 hover:bg-[#1A1A1A]/80 transition-all active:scale-95">
<span class="material-symbols-outlined text-3xl" data-icon="sports_tennis" data-weight="fill" style="font-variation-settings: 'FILL' 1;">sports_tennis</span>
<span class="font-label-bold uppercase">Tennis</span>
</button>
</div>
</section>
<section class="flex flex-col gap-lg glass-panel p-6">
<h2 class="font-headline-md metallic-text uppercase italic tracking-tight">Time &amp; Date</h2>
<div class="flex flex-col gap-6">
<!-- Date Picker -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-on-surface-variant uppercase">Select Date</label>
<input class="obsidian-input bg-black border-0 border-b border-white/20 text-white font-body-lg py-3 px-2 w-full transition-all focus:border-white focus:bg-white/5 rounded-none" type="date" value="2023-11-24"/>
</div>
<div class="grid grid-cols-2 gap-6">
<!-- Start Time -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-on-surface-variant uppercase">Start Time</label>
<input class="obsidian-input bg-black border-0 border-b border-white/20 text-white font-body-lg py-3 px-2 w-full transition-all focus:border-white focus:bg-white/5 rounded-none" type="time" value="18:00"/>
</div>
<!-- End Time -->
<div class="flex flex-col gap-2">
<label class="font-label-bold text-on-surface-variant uppercase">End Time</label>
<input class="obsidian-input bg-black border-0 border-b border-white/20 text-white font-body-lg py-3 px-2 w-full transition-all focus:border-white focus:bg-white/5 rounded-none" type="time" value="20:00"/>
</div>
</div>
</div>
</section>
</main>
<!-- Fixed Bottom Action -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black via-black/90 to-transparent z-40 flex justify-center">
<button class="w-full max-w-4xl bg-white text-black font-headline-md italic uppercase tracking-tighter py-4 px-8 border-2 border-white hover:bg-gray-200 active:scale-95 transition-all duration-200 flex items-center justify-center gap-2 rounded-none">
<span>Book Now</span>
<span class="material-symbols-outlined text-3xl" data-icon="bolt" data-weight="fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
</button>
</div>
</body></html>
